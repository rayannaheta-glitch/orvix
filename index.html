<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orvix</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --surface:  #0f0f0f;
      --surface2: #151515;
      --border:   #1e1e1e;
      --border2:  #252525;
      --ink:      #eeebe4;
      --ink-mid:  #888;
      --ink-dim:  #444;
      --accent:   #b8f54a;
      --accent-glow: rgba(184,245,74,0.18);
      --bubble-user: #1a1a1a;
      --bubble-ai:   #0f0f0f;
      --sidebar-w: 255px;
    }

    html, body { height: 100%; overflow: hidden; cursor: none; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
    }

    /* ── Custom Cursor ── */
    #cursor-outer {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }

    #cursor-inner {
      position: fixed;
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s;
    }

    body.cursor-hover #cursor-outer {
      width: 52px; height: 52px;
      background: var(--accent-glow);
      border-color: var(--accent);
    }

    body.cursor-text #cursor-outer {
      width: 3px; height: 28px;
      border-radius: 2px;
      background: var(--accent);
      border: none;
    }

    body.cursor-text #cursor-inner { opacity: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      animation: fadeIn 0.5s ease both;
    }

    .sidebar-top {
      padding: 26px 18px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-mark {
      width: 26px; height: 26px;
      border-radius: 7px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { display: block; }

    #new-chat-btn {
      margin-top: 14px;
      width: 100%;
      padding: 9px 14px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 9px;
      color: var(--ink-mid);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      letter-spacing: 0.01em;
    }

    #new-chat-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .sidebar-label {
      padding: 14px 18px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 12px;
    }

    #chat-list::-webkit-scrollbar { width: 3px; }
    #chat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .chat-item {
      padding: 9px 10px;
      border-radius: 8px;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: background 0.12s;
    }

    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: var(--surface2); }

    .chat-item-name {
      font-size: 13px;
      color: var(--ink-mid);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .chat-item.active .chat-item-name { color: var(--ink); font-weight: 500; }

    .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      cursor: none;
      color: var(--ink-dim);
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: opacity 0.1s, color 0.1s;
      flex-shrink: 0;
    }

    .chat-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #e05555; }

    /* ── Main ── */
    #main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.5s ease 0.1s both;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    #topbar {
      padding: 0 28px;
      height: 58px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 10px;
    }

    #chat-title {
      font-family: 'Instrument Serif', serif;
      font-size: 17px;
      font-weight: 400;
      font-style: italic;
      color: var(--ink-mid);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #chat-title.active { color: var(--ink); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 36px 0 20px;
      scroll-behavior: smooth;
      display: none;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .msg-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 28px;
    }

    .message-row {
      display: flex;
      margin-bottom: 24px;
    }

    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }
    .message-row.user      { animation: slideR 0.2s ease both; }
    .message-row.assistant { animation: slideL 0.2s ease both; }

    @keyframes slideR { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideL { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      margin-right: 12px; flex-shrink: 0; margin-top: 2px;
    }

    .avatar svg { display: block; }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.75;
      letter-spacing: 0.01em;
      font-weight: 400;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--bubble-user);
      color: var(--ink);
      border-radius: 16px 4px 16px 16px;
      border: 1px solid var(--border2);
    }

    .bubble.assistant {
      background: transparent;
      color: var(--ink);
      border-radius: 4px 16px 16px 16px;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding-bottom: 80px;
      animation: fadeIn 0.4s ease both;
    }

    .empty-logo {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }

    .empty-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .empty-sub {
      font-size: 13px;
      color: var(--ink-dim);
      font-weight: 400;
    }

    /* Input */
    #input-wrap {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 14px 28px 18px;
      flex-shrink: 0;
    }

    .input-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      padding: 4px 0;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      color: var(--ink);
      line-height: 1.55;
      font-weight: 400;
      resize: none;
      max-height: 140px;
      overflow-y: auto;
      cursor: none;
    }

    textarea::placeholder { color: var(--ink-dim); }
    textarea:focus { outline: none; }

    #send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none; border-radius: 9px;
      cursor: none;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover { background: #ccff55; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.25; transform: none; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--ink-dim);
      margin-top: 10px;
      letter-spacing: 0.03em;
    }

    /* Typing indicator */
    .typing-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0 4px;
    }

    .typing-label {
      font-size: 12px;
      color: var(--ink-dim);
      font-style: italic;
      font-family: 'Instrument Serif', serif;
    }

    .typing-dots {
      display: flex; gap: 4px; align-items: center;
    }

    .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent);
      animation: blink 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 8px var(--accent); }
      50% { box-shadow: 0 0 16px var(--accent); }
    }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor-outer"></div>
<div id="cursor-inner"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="3" fill="#080808"/>
          <circle cx="7" cy="2" r="1.5" fill="#080808"/>
          <circle cx="7" cy="12" r="1.5" fill="#080808"/>
          <circle cx="2" cy="7" r="1.5" fill="#080808"/>
          <circle cx="12" cy="7" r="1.5" fill="#080808"/>
        </svg>
      </div>
      Orvix
    </div>
    <button id="new-chat-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      New conversation
    </button>
  </div>
  <div class="sidebar-label">Recents</div>
  <div id="chat-list"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <div id="chat-title">Ready when you are</div>
  </div>

  <div id="messages"></div>

  <div id="empty-state">
    <div class="empty-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="4" fill="var(--accent)"/>
        <circle cx="12" cy="4" r="2" fill="var(--border2)"/>
        <circle cx="12" cy="20" r="2" fill="var(--border2)"/>
        <circle cx="4" cy="12" r="2" fill="var(--border2)"/>
        <circle cx="20" cy="12" r="2" fill="var(--border2)"/>
      </svg>
    </div>
    <div class="empty-title">What's on your mind?</div>
    <div class="empty-sub">Start a new conversation above.</div>
  </div>

  <div id="input-wrap">
    <div class="input-inner">
      <textarea id="input" placeholder="Message Orvix…" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="#080808" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
  const SYSTEM_PROMPT = `You are Orvix, an intelligent and professional AI assistant. You are sharp, concise, and genuinely helpful. You communicate with clarity and quiet confidence. You avoid filler and get straight to the point while remaining warm.`;

  // ── Cursor ──
  const cursorOuter = document.getElementById('cursor-outer');
  const cursorInner = document.getElementById('cursor-inner');
  let mouseX = 0, mouseY = 0;
  let outerX = 0, outerY = 0;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    cursorInner.style.left = mouseX + 'px';
    cursorInner.style.top  = mouseY + 'px';
  });

  function animateCursor() {
    outerX += (mouseX - outerX) * 0.12;
    outerY += (mouseY - outerY) * 0.12;
    cursorOuter.style.left = outerX + 'px';
    cursorOuter.style.top  = outerY + 'px';
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  document.querySelectorAll('button, .chat-item, #new-chat-btn').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });

  const inputEl = document.getElementById('input');
  inputEl.addEventListener('mouseenter', () => document.body.classList.add('cursor-text'));
  inputEl.addEventListener('mouseleave', () => document.body.classList.remove('cursor-text'));

  // ── Chat state ──
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const sendBtn    = document.getElementById('send-btn');
  const chatList   = document.getElementById('chat-list');
  const chatTitle  = document.getElementById('chat-title');
  const newChatBtn = document.getElementById('new-chat-btn');

  let chats = [];
  let activeChatId = null;
  let loading = false;

  function createChat() {
    const id = Date.now().toString();
    chats.unshift({ id, name: 'New conversation', history: [], domMessages: [] });
    renderSidebar();
    switchChat(id);
    addMsg(id, 'assistant', 'Hello. How can I help you today?');
    inputEl.focus();
  }

  function switchChat(id) {
    activeChatId = id;
    messagesEl.innerHTML = '';
    const chat = chats.find(c => c.id === id);
    if (!chat) return;
    chat.domMessages.forEach(({ role, content }) => renderMsg(role, content));
    chatTitle.textContent = chat.name;
    chatTitle.classList.add('active');
    emptyState.style.display = 'none';
    messagesEl.style.display = 'block';
    renderSidebar();
    scrollBottom();
    inputEl.focus();
    updateBtn();
  }

  function deleteChat(id) {
    chats = chats.filter(c => c.id !== id);
    if (activeChatId === id) {
      activeChatId = null;
      messagesEl.innerHTML = '';
      messagesEl.style.display = 'none';
      emptyState.style.display = 'flex';
      chatTitle.textContent = 'Ready when you are';
      chatTitle.classList.remove('active');
    }
    renderSidebar();
  }

  function renderSidebar() {
    chatList.innerHTML = '';
    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');

      const name = document.createElement('div');
      name.className = 'chat-item-name';
      name.textContent = chat.name;
      item.appendChild(name);

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
      del.addEventListener('click', e => { e.stopPropagation(); deleteChat(chat.id); });
      del.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      del.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
      item.appendChild(del);

      item.addEventListener('click', () => switchChat(chat.id));
      item.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      item.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
      chatList.appendChild(item);
    });
  }

  function addMsg(chatId, role, content) {
    const chat = chats.find(c => c.id === chatId);
    if (!chat) return;
    chat.domMessages.push({ role, content });
    if (role === 'user' && chat.name === 'New conversation') {
      chat.name = content.slice(0, 34) + (content.length > 34 ? '…' : '');
      if (activeChatId === chatId) chatTitle.textContent = chat.name;
      renderSidebar();
    }
    if (activeChatId === chatId) { renderMsg(role, content); scrollBottom(); }
  }

  function renderMsg(role, content) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    if (role === 'assistant') {
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.5" fill="var(--accent)"/><circle cx="7" cy="2" r="1.2" fill="var(--border2)"/><circle cx="7" cy="12" r="1.2" fill="var(--border2)"/><circle cx="2" cy="7" r="1.2" fill="var(--border2)"/><circle cx="12" cy="7" r="1.2" fill="var(--border2)"/></svg>`;
      row.appendChild(avatar);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = content;
    row.appendChild(bubble);
    wrap.appendChild(row);
    messagesEl.appendChild(wrap);
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';
    wrap.id = 'typing-wrap';
    const row = document.createElement('div');
    row.className = 'message-row assistant';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.5" fill="var(--accent)"/><circle cx="7" cy="2" r="1.2" fill="var(--border2)"/><circle cx="7" cy="12" r="1.2" fill="var(--border2)"/><circle cx="2" cy="7" r="1.2" fill="var(--border2)"/><circle cx="12" cy="7" r="1.2" fill="var(--border2)"/></svg>`;
    row.appendChild(avatar);

    const tw = document.createElement('div');
    tw.className = 'typing-wrap';
    tw.innerHTML = `<span class="typing-label">Orvix is thinking</span><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    row.appendChild(tw);
    wrap.appendChild(row);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-wrap');
    if (el) el.remove();
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
  function updateBtn() { sendBtn.disabled = !inputEl.value.trim() || loading || !activeChatId; }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || loading || !activeChatId) return;
    const chat = chats.find(c => c.id === activeChatId);
    if (!chat) return;

    loading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMsg(activeChatId, 'user', text);
    chat.history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM_PROMPT, messages: chat.history })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "I couldn't generate a response.";
      hideTyping();
      addMsg(activeChatId, 'assistant', reply);
      chat.history.push({ role: 'assistant', content: reply });
    } catch {
      hideTyping();
      addMsg(activeChatId, 'assistant', 'Something went wrong. Please try again.');
    }

    loading = false;
    updateBtn();
    inputEl.focus();
  }

  newChatBtn.addEventListener('click', createChat);
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    updateBtn();
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  createChat();
</script>
</body>
</html>
