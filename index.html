<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orvix</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <script async crossorigin="anonymous"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    data-clerk-publishable-key="pk_test_bG92ZWQtbGFtcHJleS0zOC5jbGVyay5hY2NvdW50cy5kZXYk">
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --surface:  #0f0f0f;
      --surface2: #151515;
      --border:   #1e1e1e;
      --border2:  #252525;
      --ink:      #eeebe4;
      --ink-mid:  #888;
      --ink-dim:  #444;
      --accent:   #b8f54a;
      --accent-glow: rgba(184,245,74,0.18);
      --bubble-user: #1a1a1a;
      --sidebar-w: 255px;
    }

    html, body { height: 100%; overflow: hidden; cursor: none; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
    }

    /* ── Cursor ── */
    #cursor-outer {
      position: fixed; width: 36px; height: 36px;
      border: 1.5px solid var(--accent); border-radius: 50%;
      pointer-events: none; z-index: 99999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }
    #cursor-inner {
      position: fixed; width: 5px; height: 5px;
      background: var(--accent); border-radius: 50%;
      pointer-events: none; z-index: 99999;
      transform: translate(-50%, -50%);
    }
    body.cursor-hover #cursor-outer { width: 52px; height: 52px; background: var(--accent-glow); }
    body.cursor-text  #cursor-outer { width: 3px; height: 28px; border-radius: 2px; background: var(--accent); border: none; }
    body.cursor-text  #cursor-inner { opacity: 0; }

    /* ── Login screen ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      gap: 0;
    }

    .login-bg {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }

    .login-bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.07;
    }

    .login-bg-circle.c1 {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; left: -200px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .login-bg-circle.c2 {
      width: 400px; height: 400px;
      background: #60a5fa;
      bottom: -100px; right: -100px;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(80px, 60px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-60px, -40px); } }

    .login-card {
      position: relative;
      width: 100%; max-width: 400px;
      padding: 48px 40px;
      display: flex; flex-direction: column; align-items: center;
      gap: 0;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .login-logo {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }

    .login-logo-mark {
      width: 44px; height: 44px; border-radius: 13px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }

    .login-wordmark {
      font-size: 32px; font-weight: 700; letter-spacing: -0.5px; color: var(--ink);
    }

    .login-tagline {
      font-family: 'Instrument Serif', serif;
      font-size: 15px; font-style: italic;
      color: var(--ink-mid); margin-bottom: 40px; text-align: center;
    }

    /* Clerk component container */
    #clerk-mount {
      width: 100%;
    }

    /* Override Clerk styles to match dark theme */
    #clerk-mount .cl-rootBox { width: 100%; }
    #clerk-mount .cl-card {
      background: var(--surface) !important;
      border: 1px solid var(--border2) !important;
      border-radius: 16px !important;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6) !important;
      padding: 32px !important;
    }
    #clerk-mount .cl-headerTitle { color: var(--ink) !important; font-family: 'Syne', sans-serif !important; }
    #clerk-mount .cl-headerSubtitle { color: var(--ink-mid) !important; font-family: 'Syne', sans-serif !important; }
    #clerk-mount .cl-formFieldLabel { color: var(--ink-mid) !important; font-family: 'Syne', sans-serif !important; }
    #clerk-mount .cl-formFieldInput {
      background: var(--surface2) !important;
      border-color: var(--border2) !important;
      color: var(--ink) !important;
      font-family: 'Syne', sans-serif !important;
    }
    #clerk-mount .cl-formFieldInput:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent-glow) !important; }
    #clerk-mount .cl-formButtonPrimary {
      background: var(--accent) !important;
      color: #080808 !important;
      font-family: 'Syne', sans-serif !important;
      font-weight: 600 !important;
    }
    #clerk-mount .cl-formButtonPrimary:hover { background: #ccff55 !important; }
    #clerk-mount .cl-footerActionLink { color: var(--accent) !important; }
    #clerk-mount .cl-dividerLine { background: var(--border) !important; }
    #clerk-mount .cl-dividerText { color: var(--ink-dim) !important; font-family: 'Syne', sans-serif !important; }
    #clerk-mount .cl-socialButtonsBlockButton {
      background: var(--surface2) !important;
      border-color: var(--border2) !important;
      color: var(--ink) !important;
      font-family: 'Syne', sans-serif !important;
    }
    #clerk-mount .cl-socialButtonsBlockButton:hover { border-color: var(--accent) !important; }
    #clerk-mount .cl-internal-b3fm6y { display: none !important; } /* Hide Clerk branding */

    /* ── App (hidden until logged in) ── */
    #app {
      display: none;
      width: 100%;
      height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w); height: 100vh;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }

    .sidebar-top { padding: 26px 18px 16px; border-bottom: 1px solid var(--border); }

    .logo {
      font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
      color: var(--ink); display: flex; align-items: center; gap: 9px;
    }

    .logo-mark {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    #new-chat-btn {
      margin-top: 14px; width: 100%; padding: 9px 14px;
      background: transparent; border: 1px solid var(--border2); border-radius: 9px;
      color: var(--ink-mid); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 500;
      cursor: none; display: flex; align-items: center; gap: 8px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    #new-chat-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    .sidebar-label {
      padding: 14px 18px 6px; font-size: 10px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim);
    }

    #chat-list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
    #chat-list::-webkit-scrollbar { width: 3px; }
    #chat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* User profile at bottom of sidebar */
    .sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }

    #user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--accent);
      flex-shrink: 0; overflow: hidden;
    }

    #user-avatar img { width: 100%; height: 100%; object-fit: cover; }

    #user-name {
      font-size: 12px; color: var(--ink-mid); font-weight: 400;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    #sign-out-btn {
      background: none; border: none; cursor: none;
      color: var(--ink-dim); padding: 4px; border-radius: 5px;
      transition: color 0.1s; display: flex; align-items: center; justify-content: center;
    }
    #sign-out-btn:hover { color: #e05555; }

    .chat-item {
      padding: 9px 10px; border-radius: 8px; cursor: none;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
      transition: background 0.12s;
    }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: var(--surface2); }
    .chat-item-name {
      font-size: 13px; color: var(--ink-mid); font-weight: 400;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .chat-item.active .chat-item-name { color: var(--ink); font-weight: 500; }
    .delete-btn {
      opacity: 0; background: none; border: none; cursor: none;
      color: var(--ink-dim); padding: 2px 4px; border-radius: 4px;
      line-height: 1; transition: opacity 0.1s, color 0.1s; flex-shrink: 0;
    }
    .chat-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #e05555; }

    /* ── Main ── */
    #main { flex: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    #topbar {
      padding: 0 28px; height: 58px; border-bottom: 1px solid var(--border);
      background: var(--bg); display: flex; align-items: center; flex-shrink: 0;
    }
    #chat-title {
      font-family: 'Instrument Serif', serif; font-size: 17px; font-style: italic;
      color: var(--ink-mid); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #chat-title.active { color: var(--ink); }

    #messages { flex: 1; overflow-y: auto; padding: 36px 0 20px; scroll-behavior: smooth; display: none; }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .msg-wrap { max-width: 720px; margin: 0 auto; padding: 0 28px; }
    .message-row { display: flex; margin-bottom: 24px; }
    .message-row.user      { justify-content: flex-end; animation: slideR 0.2s ease both; }
    .message-row.assistant { justify-content: flex-start; animation: slideL 0.2s ease both; }
    @keyframes slideR { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideL { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      margin-right: 12px; flex-shrink: 0; margin-top: 2px;
    }

    .bubble {
      max-width: 70%; padding: 12px 16px; font-size: 14px; line-height: 1.75;
      font-weight: 400; white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user {
      background: var(--bubble-user); color: var(--ink);
      border-radius: 16px 4px 16px 16px; border: 1px solid var(--border2);
    }
    .bubble.assistant { background: transparent; color: var(--ink); border-radius: 4px 16px 16px 16px; }
    .bubble img { display: block; max-width: 100%; max-height: 280px; border-radius: 8px; margin-bottom: 8px; object-fit: cover; }

    /* Preview chips */
    #preview-bar { display: none; flex-wrap: wrap; gap: 8px; padding: 10px 28px 0; max-width: 720px; margin: 0 auto; width: 100%; }
    .preview-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 6px 10px;
      animation: fadeChip 0.15s ease both;
    }
    @keyframes fadeChip { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .preview-chip img { width: 36px; height: 36px; border-radius: 5px; object-fit: cover; }
    .preview-chip span { font-size: 12px; color: var(--ink-mid); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip-remove { background: none; border: none; cursor: none; color: var(--ink-dim); padding: 2px; border-radius: 3px; display: flex; align-items: center; justify-content: center; transition: color 0.1s; }
    .chip-remove:hover { color: #e05555; }

    /* Empty state */
    #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding-bottom: 80px; }
    .empty-logo { width: 48px; height: 48px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
    .empty-title { font-family: 'Instrument Serif', serif; font-size: 28px; color: var(--ink); }
    .empty-sub   { font-size: 13px; color: var(--ink-dim); }

    /* Input */
    #input-wrap { border-top: 1px solid var(--border); background: var(--bg); padding: 12px 28px 18px; flex-shrink: 0; }
    .input-row { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }

    #plus-wrap { position: relative; flex-shrink: 0; }
    #plus-btn {
      width: 36px; height: 36px; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 50%; cursor: none;
      display: flex; align-items: center; justify-content: center; color: var(--ink-mid);
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.2s;
    }
    #plus-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    #plus-btn.open  { transform: rotate(45deg); border-color: var(--accent); color: var(--accent); }

    #plus-menu {
      position: absolute; bottom: calc(100% + 10px); left: 0;
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px;
      padding: 6px; min-width: 180px; display: none; flex-direction: column; gap: 2px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100;
      animation: menuPop 0.15s ease both;
    }
    #plus-menu.open { display: flex; }
    @keyframes menuPop { from { opacity:0; transform:translateY(6px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    .menu-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--ink-mid); cursor: none;
      border: none; background: none; width: 100%; text-align: left;
      transition: background 0.1s, color 0.1s; font-family: 'Syne', sans-serif;
    }
    .menu-item:hover { background: var(--border); color: var(--ink); }

    .input-box {
      flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 14px;
      padding: 10px 10px 10px 14px; display: flex; align-items: flex-end; gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    textarea {
      flex: 1; border: none; background: transparent; padding: 4px 0;
      font-size: 14px; font-family: 'Syne', sans-serif; color: var(--ink);
      line-height: 1.55; font-weight: 400; resize: none; max-height: 140px; overflow-y: auto; cursor: none;
    }
    textarea::placeholder { color: var(--ink-dim); }
    textarea:focus { outline: none; }

    #send-btn {
      width: 36px; height: 36px; background: var(--accent);
      border: none; border-radius: 9px; cursor: none;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover   { background: #ccff55; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.25; transform: none; }

    .hint { text-align: center; font-size: 11px; color: var(--ink-dim); margin-top: 10px; letter-spacing: 0.03em; }

    #file-photo, #file-any { display: none; }

    /* Typing */
    .typing-wrap { display: flex; align-items: center; gap: 6px; padding: 6px 0 4px; }
    .typing-label { font-size: 12px; color: var(--ink-dim); font-style: italic; font-family: 'Instrument Serif', serif; }
    .typing-dots  { display: flex; gap: 4px; align-items: center; }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); animation: blink 1.3s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

<div id="cursor-outer"></div>
<div id="cursor-inner"></div>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-bg">
    <div class="login-bg-circle c1"></div>
    <div class="login-bg-circle c2"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="4.5" fill="#080808"/>
          <circle cx="11" cy="3" r="2.5" fill="#080808"/>
          <circle cx="11" cy="19" r="2.5" fill="#080808"/>
          <circle cx="3" cy="11" r="2.5" fill="#080808"/>
          <circle cx="19" cy="11" r="2.5" fill="#080808"/>
        </svg>
      </div>
      <div class="login-wordmark">Orvix</div>
    </div>
    <div class="login-tagline">Your intelligent assistant</div>
    <div id="clerk-mount"></div>
  </div>
</div>

<!-- App (shown after login) -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-mark">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="3" fill="#080808"/>
            <circle cx="7" cy="2" r="1.5" fill="#080808"/>
            <circle cx="7" cy="12" r="1.5" fill="#080808"/>
            <circle cx="2" cy="7" r="1.5" fill="#080808"/>
            <circle cx="12" cy="7" r="1.5" fill="#080808"/>
          </svg>
        </div>
        Orvix
      </div>
      <button id="new-chat-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        New conversation
      </button>
    </div>
    <div class="sidebar-label">Recents</div>
    <div id="chat-list"></div>
    <div class="sidebar-footer">
      <div id="user-avatar"></div>
      <div id="user-name">Loading…</div>
      <button id="sign-out-btn" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div id="chat-title">Ready when you are</div>
    </div>
    <div id="messages"></div>
    <div id="empty-state">
      <div class="empty-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4" fill="var(--accent)"/>
          <circle cx="12" cy="4" r="2" fill="var(--border2)"/>
          <circle cx="12" cy="20" r="2" fill="var(--border2)"/>
          <circle cx="4" cy="12" r="2" fill="var(--border2)"/>
          <circle cx="20" cy="12" r="2" fill="var(--border2)"/>
        </svg>
      </div>
      <div class="empty-title">What's on your mind?</div>
      <div class="empty-sub">Start a new conversation above.</div>
    </div>
    <div id="input-wrap">
      <div id="preview-bar"></div>
      <div class="input-row" style="margin-top:10px;">
        <div id="plus-wrap">
          <button id="plus-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>
          <div id="plus-menu">
            <button class="menu-item" id="menu-photo">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                <path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Photo
            </button>
            <button class="menu-item" id="menu-file">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              File
            </button>
          </div>
        </div>
        <input type="file" id="file-photo" accept="image/png,image/jpeg,image/gif,image/webp" multiple/>
        <input type="file" id="file-any" multiple/>
        <div class="input-box">
          <textarea id="input" placeholder="Message Orvix…" rows="1"></textarea>
          <button id="send-btn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="#080808" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
  const SYSTEM_PROMPT = `You are Orvix, an intelligent and professional AI assistant. You are sharp, concise, and genuinely helpful. You communicate with clarity and quiet confidence. You avoid filler and get straight to the point while remaining warm. When images are shared, analyse them thoroughly and helpfully.`;

  // ── Cursor ──
  const cursorOuter = document.getElementById('cursor-outer');
  const cursorInner = document.getElementById('cursor-inner');
  let mouseX = 0, mouseY = 0, outerX = 0, outerY = 0;
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    cursorInner.style.left = mouseX + 'px'; cursorInner.style.top = mouseY + 'px';
  });
  (function animate() {
    outerX += (mouseX - outerX) * 0.12; outerY += (mouseY - outerY) * 0.12;
    cursorOuter.style.left = outerX + 'px'; cursorOuter.style.top = outerY + 'px';
    requestAnimationFrame(animate);
  })();
  function addHover(el) {
    if (!el) return;
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  }

  // ── Clerk Auth ──
  let clerkToken = null;

  window.addEventListener('load', async () => {
    await window.Clerk.load();
    const clerk = window.Clerk;

    if (clerk.user) {
      showApp(clerk);
    } else {
      // Mount sign-in UI
      clerk.mountSignIn(document.getElementById('clerk-mount'), {
        appearance: { baseTheme: undefined }
      });
      clerk.addListener(({ user }) => {
        if (user) showApp(clerk);
      });
    }
  });

  async function showApp(clerk) {
    // Get session token for API calls
    clerkToken = await clerk.session.getToken();

    // Show user info
    const user = clerk.user;
    const avatarEl = document.getElementById('user-avatar');
    const nameEl   = document.getElementById('user-name');

    if (user.imageUrl) {
      avatarEl.innerHTML = `<img src="${user.imageUrl}" alt="avatar"/>`;
    } else {
      avatarEl.textContent = (user.firstName?.[0] || user.emailAddresses?.[0]?.emailAddress?.[0] || 'U').toUpperCase();
    }
    nameEl.textContent = user.firstName
      ? `${user.firstName} ${user.lastName || ''}`.trim()
      : user.emailAddresses?.[0]?.emailAddress || 'User';

    // Sign out
    document.getElementById('sign-out-btn').addEventListener('click', async () => {
      await clerk.signOut();
      location.reload();
    });

    // Hide login, show app
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    initChat();
  }

  // ── Elements ──
  let inputEl, sendBtn, plusBtn, plusMenu, menuPhoto, menuFile,
      filePhoto, fileAny, previewBar, messagesEl, emptyState,
      chatList, chatTitle, newChatBtn;

  function initChat() {
    inputEl    = document.getElementById('input');
    sendBtn    = document.getElementById('send-btn');
    plusBtn    = document.getElementById('plus-btn');
    plusMenu   = document.getElementById('plus-menu');
    menuPhoto  = document.getElementById('menu-photo');
    menuFile   = document.getElementById('menu-file');
    filePhoto  = document.getElementById('file-photo');
    fileAny    = document.getElementById('file-any');
    previewBar = document.getElementById('preview-bar');
    messagesEl = document.getElementById('messages');
    emptyState = document.getElementById('empty-state');
    chatList   = document.getElementById('chat-list');
    chatTitle  = document.getElementById('chat-title');
    newChatBtn = document.getElementById('new-chat-btn');

    [newChatBtn, plusBtn, sendBtn, menuPhoto, menuFile,
     document.getElementById('sign-out-btn')].forEach(addHover);

    inputEl.addEventListener('mouseenter', () => document.body.classList.add('cursor-text'));
    inputEl.addEventListener('mouseleave', () => document.body.classList.remove('cursor-text'));

    // + menu
    plusBtn.addEventListener('click', e => {
      e.stopPropagation();
      const open = plusMenu.classList.toggle('open');
      plusBtn.classList.toggle('open', open);
    });
    document.addEventListener('click', () => { plusMenu.classList.remove('open'); plusBtn.classList.remove('open'); });
    plusMenu.addEventListener('click', e => e.stopPropagation());
    menuPhoto.addEventListener('click', () => { filePhoto.click(); closePlus(); });
    menuFile.addEventListener('click',  () => { fileAny.click();   closePlus(); });
    function closePlus() { plusMenu.classList.remove('open'); plusBtn.classList.remove('open'); }

    // File handling
    filePhoto.addEventListener('change', () => handleFiles(filePhoto.files));
    fileAny.addEventListener('change',   () => handleFiles(fileAny.files));

    newChatBtn.addEventListener('click', createChat);
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
      updateBtn();
    });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);

    createChat();
  }

  // ── Files ──
  let pendingFiles = [];

  function handleFiles(files) {
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        pendingFiles.push({ base64: dataUrl.split(',')[1], mediaType: file.type, dataUrl, name: file.name, isImage: file.type.startsWith('image/') });
        renderPreviews(); updateBtn();
      };
      reader.readAsDataURL(file);
    });
    if (filePhoto) filePhoto.value = '';
    if (fileAny)   fileAny.value   = '';
  }

  function renderPreviews() {
    if (!previewBar) return;
    previewBar.innerHTML = '';
    if (pendingFiles.length === 0) { previewBar.style.display = 'none'; return; }
    previewBar.style.display = 'flex';
    pendingFiles.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'preview-chip';
      if (f.isImage) {
        const img = document.createElement('img'); img.src = f.dataUrl; chip.appendChild(img);
      } else {
        const icon = document.createElement('div');
        icon.style.cssText = 'width:36px;height:36px;border-radius:5px;background:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0';
        icon.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="var(--ink-mid)" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
        chip.appendChild(icon);
      }
      const name = document.createElement('span'); name.textContent = f.name; chip.appendChild(name);
      const rm = document.createElement('button'); rm.className = 'chip-remove';
      rm.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
      rm.addEventListener('click', () => { pendingFiles.splice(i, 1); renderPreviews(); updateBtn(); });
      addHover(rm); chip.appendChild(rm);
      previewBar.appendChild(chip);
    });
  }

  // ── Chat ──
  let chats = [], activeChatId = null, loading = false;

  function createChat() {
    const id = Date.now().toString();
    chats.unshift({ id, name: 'New conversation', history: [], domMessages: [] });
    renderSidebar(); switchChat(id);
    addMsg(id, 'assistant', [], 'Hello. How can I help you today?');
    inputEl.focus();
  }

  function switchChat(id) {
    activeChatId = id;
    messagesEl.innerHTML = '';
    const chat = chats.find(c => c.id === id);
    if (!chat) return;
    chat.domMessages.forEach(m => renderMsg(m.role, m.files || [], m.text));
    chatTitle.textContent = chat.name; chatTitle.classList.add('active');
    emptyState.style.display = 'none'; messagesEl.style.display = 'block';
    renderSidebar(); scrollBottom(); inputEl.focus(); updateBtn();
  }

  function deleteChat(id) {
    chats = chats.filter(c => c.id !== id);
    if (activeChatId === id) {
      activeChatId = null; messagesEl.innerHTML = '';
      messagesEl.style.display = 'none'; emptyState.style.display = 'flex';
      chatTitle.textContent = 'Ready when you are'; chatTitle.classList.remove('active');
    }
    renderSidebar();
  }

  function renderSidebar() {
    if (!chatList) return;
    chatList.innerHTML = '';
    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
      const name = document.createElement('div'); name.className = 'chat-item-name'; name.textContent = chat.name; item.appendChild(name);
      const del = document.createElement('button'); del.className = 'delete-btn';
      del.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
      del.addEventListener('click', e => { e.stopPropagation(); deleteChat(chat.id); });
      addHover(del); item.appendChild(del);
      item.addEventListener('click', () => switchChat(chat.id)); addHover(item);
      chatList.appendChild(item);
    });
  }

  function addMsg(chatId, role, files, text) {
    const chat = chats.find(c => c.id === chatId); if (!chat) return;
    chat.domMessages.push({ role, files, text });
    if (role === 'user' && chat.name === 'New conversation') {
      chat.name = (text || (files.length ? files[0].name : 'Attachment')).slice(0, 34);
      if (activeChatId === chatId && chatTitle) chatTitle.textContent = chat.name;
      renderSidebar();
    }
    if (activeChatId === chatId) { renderMsg(role, files, text); scrollBottom(); }
  }

  function renderMsg(role, files, text) {
    const wrap = document.createElement('div'); wrap.className = 'msg-wrap';
    const row  = document.createElement('div'); row.className = `message-row ${role}`;
    if (role === 'assistant') {
      const av = document.createElement('div'); av.className = 'avatar';
      av.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.5" fill="var(--accent)"/><circle cx="7" cy="2" r="1.2" fill="var(--border2)"/><circle cx="7" cy="12" r="1.2" fill="var(--border2)"/><circle cx="2" cy="7" r="1.2" fill="var(--border2)"/><circle cx="12" cy="7" r="1.2" fill="var(--border2)"/></svg>`;
      row.appendChild(av);
    }
    const bubble = document.createElement('div'); bubble.className = `bubble ${role}`;
    (files || []).forEach(f => {
      if (f.isImage) {
        const img = document.createElement('img'); img.src = f.dataUrl; img.alt = f.name; bubble.appendChild(img);
      } else {
        const fc = document.createElement('div');
        fc.style.cssText = 'display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:var(--ink-mid);';
        fc.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg><span>${f.name}</span>`;
        bubble.appendChild(fc);
      }
    });
    if (text) { const t = document.createElement('span'); t.textContent = text; bubble.appendChild(t); }
    row.appendChild(bubble); wrap.appendChild(row); messagesEl.appendChild(wrap);
  }

  function showTyping() {
    const wrap = document.createElement('div'); wrap.className = 'msg-wrap'; wrap.id = 'typing-wrap';
    const row  = document.createElement('div'); row.className = 'message-row assistant';
    const av   = document.createElement('div'); av.className = 'avatar';
    av.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.5" fill="var(--accent)"/><circle cx="7" cy="2" r="1.2" fill="var(--border2)"/><circle cx="7" cy="12" r="1.2" fill="var(--border2)"/><circle cx="2" cy="7" r="1.2" fill="var(--border2)"/><circle cx="12" cy="7" r="1.2" fill="var(--border2)"/></svg>`;
    row.appendChild(av);
    const tw = document.createElement('div'); tw.className = 'typing-wrap';
    tw.innerHTML = `<span class="typing-label">Orvix is thinking</span><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    row.appendChild(tw); wrap.appendChild(row); messagesEl.appendChild(wrap); scrollBottom();
  }

  function hideTyping() { const el = document.getElementById('typing-wrap'); if (el) el.remove(); }
  function scrollBottom() { if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight; }
  function updateBtn() { if (sendBtn) sendBtn.disabled = (!inputEl.value.trim() && pendingFiles.length === 0) || loading || !activeChatId; }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if ((!text && pendingFiles.length === 0) || loading || !activeChatId) return;
    const chat = chats.find(c => c.id === activeChatId); if (!chat) return;

    loading = true; sendBtn.disabled = true;
    const filesSnapshot = [...pendingFiles]; pendingFiles = []; renderPreviews();
    inputEl.value = ''; inputEl.style.height = 'auto';

    let userContent;
    const imageFiles = filesSnapshot.filter(f => f.isImage);
    if (imageFiles.length > 0) {
      userContent = imageFiles.map(f => ({ type: 'image', source: { type: 'base64', media_type: f.mediaType, data: f.base64 } }));
      if (text) userContent.push({ type: 'text', text });
    } else {
      userContent = text;
    }

    addMsg(activeChatId, 'user', filesSnapshot, text || null);
    chat.history.push({ role: 'user', content: userContent });
    showTyping();

    // Refresh token before each request
    clerkToken = await window.Clerk.session.getToken();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${clerkToken}` },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM_PROMPT, messages: chat.history })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "I couldn't generate a response.";
      hideTyping(); addMsg(activeChatId, 'assistant', [], reply);
      chat.history.push({ role: 'assistant', content: reply });
    } catch {
      hideTyping(); addMsg(activeChatId, 'assistant', [], 'Something went wrong. Please try again.');
    }

    loading = false; updateBtn(); inputEl.focus();
  }
</script>
</body>
</html>
